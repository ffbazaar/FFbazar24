<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Lab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
body{background:#121212;color:#fff;height:100vh;overflow:hidden;}

/* Gallery Screen */
#galleryScreen{display:flex;flex-direction:column;height:100vh;}
header{height:56px;background:#1e1e1e;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid #2a2a2a;}
.right-btn{background:linear-gradient(90deg,#ff7a00,#8b5cf6);border:none;padding:6px 16px;border-radius:20px;color:#fff;font-weight:600;font-size:13px;}
.content{flex:1;overflow-y:auto;padding:12px;}
.dropdown{font-size:16px;font-weight:600;margin-bottom:15px;}
.date-group{margin-bottom:20px;}
.date-title{font-size:14px;color:#aaa;margin-bottom:8px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;}
.grid img{width:100%;aspect-ratio:1/1;object-fit:cover;cursor:pointer;}

/* Edit Screen */
#editScreen{display:none;flex-direction:column;height:100vh;background:#000;}
.edit-header{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:#1e1e1e;}
.edit-header svg{width:24px;height:24px;fill:#fff;cursor:pointer;}
.edit-canvas{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;}
.edit-canvas canvas{max-width:100%;max-height:100%;}

/* Bottom Tools Bar */
.edit-tools{background:#1e1e1e;padding:12px 0;border-top:1px solid #2a2a2a;min-height:80px;}
.tools-row{display:flex;justify-content:space-around;align-items:center;}
.tool-item{display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;color:#aaa;cursor:pointer;padding:5px;}
.tool-item:active{background:#333;border-radius:8px;}
.tool-item svg{width:22px;height:22px;fill:currentColor;}

.adjust-panel{display:none;background:#1e1e1e;padding:15px;border-top:1px solid #2a2a2a;}
.adjust-panel.active{display:block;}
.adjust-row{margin-bottom:15px;}
.adjust-row label{display:block;font-size:12px;color:#aaa;margin-bottom:5px;}
.adjust-row input{width:100%;}

.bottom-nav{height:60px;background:#1e1e1e;display:flex;justify-content:space-around;align-items:center;border-top:1px solid #2a2a2a;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;color:#888;cursor:pointer;}
.nav-item.active{color:#fff;}
.nav-item svg{width:24px;height:24px;fill:currentColor;}

#fileInput{display:none;}
.loader{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;z-index:999;}
.spinner{width:40px;height:40px;border:3px solid #333;border-top:3px solid #ff7a00;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- Gallery Screen -->
<div id="galleryScreen">
<header>
  <div>☰</div>
  <button class="right-btn">⭐ Welcome</button>
  <div>⋮</div>
</header>

<div class="content">
  <div class="dropdown">Photos on device ▼</div>
  <div id="gallery">
    <div style="text-align:center;padding:50px;color:#666;">
      <p>Click + to add photos</p>
      <input type="file" id="fileInput" multiple accept="image/*">
      <button onclick="document.getElementById('fileInput').click()" style="margin-top:10px;padding:10px 20px;background:#8b5cf6;border:none;border-radius:8px;color:#fff;cursor:pointer;">+ Add Photos</button>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item active">
    <svg viewBox="0 0 24 24"><path d="M22 16V4c0-1.1-.9-2-2-2H8c-1.1 0-2.9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2zm-11-4l2.03 2.71L16 12l4 5H8l3-4zM2 6v14c0 1.1.9 2 2 2h14v-2H4V6H2z"/></svg>
    <span>Gallery</span>
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg>
    <span>Pro Lab</span>
  </div>
  <div class="nav-item">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    <span>Community</span>
  </div>
</div>
</div>

<!-- Edit Screen -->
<div id="editScreen">
<header class="edit-header">
  <svg onclick="backToGallery()" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
  <div style="display:flex;gap:20px;">
    <svg onclick="sharePhoto()" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c.24.04.47.09.7.13l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c.24.04.47.09.7.13L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
  </div>
</header>

<div class="edit-canvas">
  <canvas id="canvas"></canvas>
</div>

<div id="adjustPanel" class="adjust-panel">
  <div class="adjust-row">
    <label>Brightness</label>
    <input type="range" id="brightness" min="0" max="200" value="100" oninput="applyFilters()">
  </div>
  <div class="adjust-row">
    <label>Contrast</label>
    <input type="range" id="contrast" min="0" max="200" value="100" oninput="applyFilters()">
  </div>
  <div class="adjust-row">
    <label>Saturation</label>
    <input type="range" id="saturation" min="0" max="200" value="100" oninput="applyFilters()">
  </div>
</div>

<div class="edit-tools">
  <div class="tools-row">
    <div class="tool-item" onclick="alert('Actions coming soon')">
      <svg viewBox="0 0 24 24"><path d="M9.4 18L8 16.6l4.6-4.6L8 7.4 9.4 6l6 6-6 6z"/></svg>
      <span>Actions</span>
    </div>
    <div class="tool-item" onclick="alert('Presets coming soon')">
      <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
      <span>Presets</span>
    </div>
    <div class="tool-item" onclick="alert('Crop tool coming soon')">
      <svg viewBox="0 0 24 24"><path d="M17 15h2V7c0-1.1-.9-2-2-2h-8v2h8v8zM7 17V1H5v4H1v2h4v10c0 1.1.9 2 2 2h10v-2H7z"/></svg>
      <span>Crop</span>
    </div>
    <div class="tool-item active" onclick="toggleAdjustPanel()">
      <svg viewBox="0 0 24 24"><path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/></svg>
      <span>Edit</span>
    </div>
    <div class="tool-item" onclick="alert('Masking is Pro feature')">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
      <span>Masking ★</span>
    </div>
    <div class="tool-item" onclick="removeBackground()">
      <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      <span>Remove ★</span>
    </div>
  </div>
</div>
</div>

<div class="loader" id="loader">
  <div class="spinner"></div>
  <p id="loaderText">Processing...</p>
</div>

<script>
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let originalImage = null;
let photosByDate = {};

document.getElementById('fileInput').onchange = (e)=>{
  const files = Array.from(e.target.files);
  files.forEach(file=>{
    const date = new Date(file.lastModified).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
    if(!photosByDate[date]) photosByDate[date]=[];
    photosByDate[date].push(URL.createObjectURL(file));
  });
  renderGallery();
}

function renderGallery(){
  const gallery = document.getElementById('gallery');
  gallery.innerHTML='';
  Object.keys(photosByDate).forEach(date=>{
    const dateGroup = document.createElement('div');
    dateGroup.className='date-group';
    dateGroup.innerHTML=`<div class="date-title">${date}</div>
      <div class="grid">
        ${photosByDate[date].map(url=>`<img src="${url}" onclick="openPhoto('${url}')">`).join('')}
      </div>`;
    gallery.appendChild(dateGroup);
  });
}

function openPhoto(url){
  document.getElementById('galleryScreen').style.display='none';
  document.getElementById('editScreen').style.display='flex';

  const img = new Image();
  img.onload = ()=>{
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img,0,0);
    originalImage = ctx.getImageData(0,0,canvas.width,canvas.height);
  }
  img.src = url;
}

function backToGallery(){
  document.getElementById('editScreen').style.display='none';
  document.getElementById('galleryScreen').style.display='flex';
}

function toggleAdjustPanel(){
  document.getElementById('adjustPanel').classList.toggle('active');
}

function applyFilters(){
  if(!originalImage) return;
  ctx.putImageData(originalImage,0,0);
  const b = document.getElementById('brightness').value;
  const c = document.getElementById('contrast').value;
  const s = document.getElementById('saturation').value;
  ctx.filter = `brightness(${b}%) contrast(${c}%) saturate(${s}%)`;
  ctx.drawImage(canvas,0,0);
  ctx.filter='none';
}

async function removeBackground(){
  if(!originalImage) return alert('No image loaded');
  showLoader('Removing Background...');
  canvas.toBlob(async(blob)=>{
    const formData = new FormData();
    formData.append('image',blob);
    try{
      const res = await fetch('https://api-inference.huggingface.co/models/briaai/RMBG-1.4',{
        method:'POST',
        headers:{'Authorization':'Bearer hf_YOUR_TOKEN_HERE'},
        body:formData
      });
      if(!res.ok) throw new Error('API Error');
      const newBlob = await res.blob();
      const img = new Image();
      img.onload = ()=>{
        canvas.width=img.width;
        canvas.height=img.height;
        ctx.drawImage(img,0,0);
        originalImage=ctx.getImageData(0,0,canvas.width,canvas.height);
      }
      img.src=URL.createObjectURL(newBlob);
    }catch(e){
      alert('Get free API key from huggingface.co and replace hf_YOUR_TOKEN_HERE');
    }
    hideLoader();
  });
}

function sharePhoto(){
  canvas.toBlob(blob=>{
    const file = new File(,'photo.png',{type:'image/png'});
    if(navigator.share){
      navigator.share({files:}).catch(()=>{});
    }else{
      alert('Share not supported');
    }
  });
}

function showLoader(text){
  document.getElementById('loader').style.display='flex';
  document.getElementById('loaderText').textContent=text;
}
function hideLoader(){
  document.getElementById('loader').style.display='none';
}
</script>
</body>
</html>
