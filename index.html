<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Lab Editor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#0a0a0f;color:#fff;height:100vh;display:flex;flex-direction:column;}
header{height:60px;background:#1a1a1f;display:flex;align-items:center;padding:0 20px;justify-content:space-between;border-bottom:1px solid #2a2a2f;}
.logo{font-size:22px;font-weight:700;background:linear-gradient(90deg,#ff7a00,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
header button{background:linear-gradient(90deg,#ff7a00,#8b5cf6);border:none;padding:8px 18px;border-radius:8px;color:#fff;font-weight:600;cursor:pointer;}
.main{flex:1;display:flex;overflow:hidden;}
.sidebar{width:280px;background:#1a1a1f;border-right:1px solid #2a2a2f;padding:20px;overflow-y:auto;}
.canvas-area{flex:1;display:flex;align-items:center;justify-content:center;background:#000;padding:20px;}
canvas{max-width:100%;max-height:100%;border-radius:12px;}
.tool-group{margin-bottom:25px;}
.tool-group h3{font-size:14px;color:#ff7a00;margin-bottom:12px;}
.tool-group input[type="range"]{width:100%;}
.tool-btn{width:100%;padding:10px;margin:5px 0;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;}
.tool-btn:hover{background:#8b5cf6;}
.tool-btn:disabled{opacity:0.5;cursor:not-allowed;}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.filter{padding:15px;background:#333;border-radius:8px;text-align:center;cursor:pointer;font-size:12px;}
.filter:hover,.filter.active{background:#ff7a00;}
.upload-area{border:2px dashed #444;border-radius:12px;padding:40px;text-align:center;}
.loader{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;z-index:999;}
.spinner{width:40px;height:40px;border:3px solid #333;border-top:3px solid #ff7a00;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@media(max-width:768px){.main{flex-direction:column;}.sidebar{width:100%;height:200px;}}
</style>
</head>
<body>

<header>
  <div class="logo">Pro Lab Editor</div>
  <div>
    <input type="file" id="fileInput" accept="image/*" hidden>
    <button onclick="document.getElementById('fileInput').click()">Open Image</button>
    <button onclick="downloadImage()">Export</button>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="tool-group" id="uploadSection">
      <div class="upload-area">
        <h3>📸 Upload Image</h3>
        <p style="color:#666;font-size:13px;">JPG, PNG Supported</p>
      </div>
    </div>

    <div class="tool-group">
      <h3>AI Tools</h3>
      <button class="tool-btn" id="bgRemoveBtn" onclick="removeBackground()">🤖 Remove Background</button>
      <button class="tool-btn" onclick="autoFix()">⚡ Auto Fix</button>
    </div>

    <div class="tool-group">
      <h3>Adjust</h3>
      Brightness <input type="range" id="brightness" min="0" max="200" value="100">
      Contrast <input type="range" id="contrast" min="0" max="200" value="100">
      Saturation <input type="range" id="saturation" min="0" max="200" value="100">
      Blur <input type="range" id="blur" min="0" max="20" value="0">
    </div>

    <div class="tool-group">
      <h3>Filters</h3>
      <div class="filter-grid">
        <div class="filter active" onclick="applyFilter('none')">Normal</div>
        <div class="filter" onclick="applyFilter('grayscale')">B&W</div>
        <div class="filter" onclick="applyFilter('sepia')">Vintage</div>
        <div class="filter" onclick="applyFilter('cinematic')">Cinematic</div>
      </div>
    </div>

    <div class="tool-group">
      <h3>Transform</h3>
      <button class="tool-btn" onclick="rotate(90)">Rotate 90°</button>
      <button class="tool-btn" onclick="resetImage()">Reset</button>
    </div>
  </div>

  <div class="canvas-area">
    <canvas id="canvas"></canvas>
  </div>
</div>

<div class="loader" id="loader">
  <div class="spinner"></div>
  <p id="loaderText">Processing...</p>
</div>

<script>
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let originalImage = null;
let rotation = 0;

const fileInput = document.getElementById('fileInput');

// Upload
fileInput.onchange = (e) => loadImage(e.target.files[0]);

function loadImage(file){
  if(!file) return;
  const img = new Image();
  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img,0,0);
    originalImage = ctx.getImageData(0,0,canvas.width,canvas.height);
    document.getElementById('uploadSection').style.display='none';
  }
  img.src = URL.createObjectURL(file);
}

// Adjust
['brightness','contrast','saturation','blur'].forEach(id=>{
  document.getElementById(id).oninput = applyFilters;
});

function applyFilters(){
  if(!originalImage) return;
  ctx.putImageData(originalImage,0,0);
  
  const b = document.getElementById('brightness').value;
  const c = document.getElementById('contrast').value;
  const s = document.getElementById('saturation').value;
  const bl = document.getElementById('blur').value;
  
  ctx.filter = `brightness(${b}%) contrast(${c}%) saturate(${s}%) blur(${bl}px)`;
  ctx.drawImage(canvas,0,0);
  ctx.filter='none';
}

// Filters
function applyFilter(type){
  document.querySelectorAll('.filter').forEach(f=>f.classList.remove('active'));
  event.target.classList.add('active');
  
  if(!originalImage) return;
  ctx.putImageData(originalImage,0,0);
  
  const filters = {
    grayscale:'grayscale(100%)',
    sepia:'sepia(100%)',
    cinematic:'contrast(120%) saturate(110%) sepia(10%)',
    none:'none'
  };
  
  ctx.filter = filters[type];
  ctx.drawImage(canvas,0,0);
  ctx.filter='none';
}

// Rotate
function rotate(deg){
  rotation += deg;
  ctx.save();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.translate(canvas.width/2,canvas.height/2);
  ctx.rotate(rotation*Math.PI/180);
  ctx.drawImage(canvas,-canvas.width/2,-canvas.height/2);
  ctx.restore();
}

// Reset
function resetImage(){
  if(!originalImage) return;
  rotation=0;
  ctx.putImageData(originalImage,0,0);
  document.getElementById('brightness').value=100;
  document.getElementById('contrast').value=100;
  document.getElementById('saturation').value=100;
  document.getElementById('blur').value=0;
  document.querySelectorAll('.filter').forEach(f=>f.classList.remove('active'));
  document.querySelector('.filter').classList.add('active');
}

// Auto Fix
function autoFix(){
  if(!originalImage) return;
  document.getElementById('brightness').value=110;
  document.getElementById('contrast').value=115;
  document.getElementById('saturation').value=110;
  applyFilters();
}

// Background Remove - Uses Hugging Face API
async function removeBackground(){
  if(!originalImage) return alert('Upload an image first');
  
  showLoader('Removing Background...');
  document.getElementById('bgRemoveBtn').disabled=true;
  
  canvas.toBlob(async(blob)=>{
    const formData = new FormData();
    formData.append('image',blob);
    
    try{
      const res = await fetch('https://api-inference.huggingface.co/models/briaai/RMBG-1.4',{
        method:'POST',
        headers:{'Authorization':'Bearer hf_YOUR_TOKEN_HERE'},
        body:formData
      });
      
      if(!res.ok) throw new Error('API Error');
      
      const newBlob = await res.blob();
      const img = new Image();
      img.onload = ()=>{
        canvas.width=img.width;
        canvas.height=img.height;
        ctx.drawImage(img,0,0);
        originalImage=ctx.getImageData(0,0,canvas.width,canvas.height);
      }
      img.src=URL.createObjectURL(newBlob);
    }catch(e){
      alert('Error: Get free API key from huggingface.co and replace hf_YOUR_TOKEN_HERE');
    }
    
    hideLoader();
    document.getElementById('bgRemoveBtn').disabled=false;
  });
}

// Export
function downloadImage(){
  if(!originalImage) return alert('No image to download');
  const link=document.createElement('a');
  link.download='edited_photo.png';
  link.href=canvas.toDataURL('image/png',1.0);
  link.click();
}

function showLoader(text){
  document.getElementById('loader').style.display='flex';
  document.getElementById('loaderText').textContent=text;
}

function hideLoader(){
  document.getElementById('loader').style.display='none';
}
</script>
</body>
</html>
